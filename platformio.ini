[platformio]
src_dir = .
default_envs = native

; JSON is an optional feature. The native PlatformIO environment keeps
; ArduinoJson available by default, and Defines.h enables the JSON helpers
; automatically when <ArduinoJson.h> is present.
; Set -DLUMALINK_HTTP_ENABLE_ARDUINO_JSON=0 to exercise JSON-disabled builds.

[env:native]
platform = native
framework =
test_framework = unity
test_build_src = yes
extra_scripts = pre:scripts/native_build.py
build_src_filter =
    +<src/>
lib_extra_dirs =
    C:/ode
lib_deps =
    symlink://C:/ode/lumalink-platform
    bblanchon/ArduinoJson@^7.4.2
    throwtheswitch/Unity@^2.6.1
build_unflags =
    -std=gnu++11
build_flags =
    -Isrc
    -Isrc/llhttp/include
    -std=gnu++17
    -DUNIT_TEST
lib_ldf_mode = deep+
lib_compat_mode = strict