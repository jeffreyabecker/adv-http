<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
</head>
<body>
    <h1>Hello, World!</h1>
    <p>This is a simple static HTML page.</p>
    <button onclick="getUptime()">Get Uptime</button>
    <div id="uptime"></div>
    <script>
        function getUptime() {
            fetch('/api/data')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('uptime').innerText = 'Uptime: ' + data.uptime + ' ms';
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
