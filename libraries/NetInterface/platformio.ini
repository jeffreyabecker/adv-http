[platformio]
default_envs = esp32dev, esp8266, pico

[env]
framework = arduino
lib_deps = 
    bblanchon/ArduinoJson@^7.0.0
build_flags = 
    -std=c++11
    -Wall
    -Wextra
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_CDC
lib_ldf_mode = deep+

[env:esp32dev]
platform = espressif32
board = esp32dev
build_flags = 
    ${env.build_flags}
    -DESP32
monitor_speed = 115200

[env:esp8266]
platform = espressif8266
board = nodemcuv2
build_flags = 
    ${env.build_flags}
    -DESP8266
monitor_speed = 115200

[env:pico]
platform = raspberrypi
board = pico
build_flags = 
    ${env.build_flags}
    -DRASPBERRY_PI_PICO
monitor_speed = 115200

