[native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
    -DUNIT_TEST
    -Isrc/llhttp/include
    -Itest/support/native_arduino

[env:native]
platform = ${native.platform}
framework =
test_framework = ${native.test_framework}
test_build_src = ${native.test_build_src}
build_src_filter =
    +<src/>
lib_deps =
    ${common.lib_deps}
build_flags =
    ${common.build_flags}
    ${native.build_flags}