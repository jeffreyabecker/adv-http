[rp2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
filesystem = littlefs
extra_build_flags =
    -DARDUINO_ARCH_RP2040

[env:rpipicow]
platform = ${rp2040.platform}
board = ${rp2040.board}
board_build.filesystem = ${rp2040.filesystem}
build_flags =
    ${env.build_flags}
    ${rp2040.extra_build_flags}