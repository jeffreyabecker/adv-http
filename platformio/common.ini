[common]
build_src_filter =
    +<src/>
    +<platformio/noop/main.cpp>
lib_deps =
    bblanchon/ArduinoJson@^7.4.2
build_flags =
    -Isrc
    -Isrc/llhttp/include
monitor_speed = 115200
lib_ldf_mode = deep+
lib_compat_mode = strict

; JSON is an optional feature. Board environments keep ArduinoJson available by default,
; and Defines.h enables the JSON helpers automatically when <ArduinoJson.h> is present.
; Set -DHTTPSERVER_ADVANCED_ENABLE_ARDUINO_JSON=0 to exercise JSON-disabled builds.

[env]
framework = arduino
build_src_filter = ${common.build_src_filter}
lib_deps =
    ${common.lib_deps}
build_flags =
    ${common.build_flags}
monitor_speed = ${common.monitor_speed}
lib_ldf_mode = ${common.lib_ldf_mode}
lib_compat_mode = ${common.lib_compat_mode}