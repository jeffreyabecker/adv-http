[common]
lib_extra_dirs =
    C:/ode
lib_deps =
    symlink://C:/ode/lumalink-platform
    bblanchon/ArduinoJson@^7.4.2

build_flags =
    -Isrc
    -Isrc/llhttp/include
monitor_speed = 115200
lib_ldf_mode = deep+
lib_compat_mode = strict

; JSON is an optional feature. Board environments keep ArduinoJson available by default,
; and Defines.h enables the JSON helpers automatically when <ArduinoJson.h> is present.
; Set -DLUMALINK_HTTP_ENABLE_ARDUINO_JSON=0 to exercise JSON-disabled builds.

[env]
framework = arduino
lib_deps =
    ${common.lib_deps}
build_unflags =
    -std=gnu++11
build_flags =
    ${common.build_flags}
    -std=gnu++17
monitor_speed = ${common.monitor_speed}
lib_ldf_mode = ${common.lib_ldf_mode}
lib_compat_mode = ${common.lib_compat_mode}