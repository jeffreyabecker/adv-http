[esp8266]
platform = espressif8266
board = nodemcuv2
filesystem = littlefs
extra_build_flags =
    -DARDUINO_ARCH_ESP8266

[env:esp8266]
platform = ${esp8266.platform}
board = ${esp8266.board}
board_build.filesystem = ${esp8266.filesystem}
build_flags =
    ${env.build_flags}
    ${esp8266.extra_build_flags}